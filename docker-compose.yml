services:
  redis:
    image: redis:7-alpine
    container_name: kochi_redis
    restart: always  
    volumes:
      - redis_data:/data 

  backend:
    build: ./backend
    container_name: kochi_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0 
    depends_on:
      - redis

  worker:
    build: ./backend
    container_name: kochi_worker
    restart: always
    command: celery -A app.workers.celery:celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: kochi_frontend
    ports:
      - "80:8080" 
    depends_on:
      - backend

volumes:
  redis_data: