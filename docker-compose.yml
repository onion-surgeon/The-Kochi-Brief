services:
  redis:
    image: redis:7-alpine
    container_name: kochi_redis
    restart: always  
    volumes:
      - redis_data:/data 

  backend:
    build: ./backend
    image: kochi_backend_image
    container_name: kochi_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0 
    depends_on:
      - redis

  worker:
    image: kochi_backend_image
    container_name: kochi_worker
    restart: always
    command: celery -A app.workers.celery:celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  celery_beat:
      image: kochi_backend_image
      container_name: kochi_beat
      restart: always
      command: celery -A app.workers.celery:celery_app beat --loglevel=info
      env_file:
        - ./backend/.env
      environment:
        REDIS_URL: redis://redis:6379/0
      depends_on:
        - redis


volumes:
  redis_data: